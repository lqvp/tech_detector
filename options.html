<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      background: #fff;
      padding: 20px;
    }
    h1 {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 16px;
    }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 6px;
    }
    .input-wrap {
      display: flex;
      gap: 6px;
    }
    input[type="password"],
    input[type="text"] {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      outline: none;
    }
    input:focus { border-color: #4A90D9; }
    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-toggle {
      background: #f5f7fa;
      color: #667;
    }
    .btn-toggle:hover { background: #e8ecf1; }
    .btn-save {
      background: #4A90D9;
      color: #fff;
      width: 100%;
      margin-top: 8px;
    }
    .btn-save:hover { background: #3a7bc8; }
    .status {
      margin-top: 8px;
      font-size: 12px;
      min-height: 18px;
    }
    .status.ok { color: #2ecc71; }
    .status.err { color: #e74c3c; }
    .hint {
      margin-top: 16px;
      font-size: 11px;
      color: #999;
      line-height: 1.6;
    }
    .hint a {
      color: #4A90D9;
      text-decoration: none;
    }
    .hint a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Tech Detector 設定</h1>
  <div class="field">
    <label for="apikey">VirusTotal API キー</label>
    <div class="input-wrap">
      <input type="password" id="apikey" placeholder="APIキーを入力">
      <button class="btn btn-toggle" id="toggle-btn" type="button">表示</button>
    </div>
  </div>
  <button class="btn btn-save" id="save-btn" type="button">保存</button>
  <div class="status" id="status"></div>
  <div class="hint">
    APIキーは <a href="https://www.virustotal.com/gui/join" target="_blank" rel="noopener">VirusTotal</a>
    に無料登録して取得できます。
  </div>
  <script src="browser-polyfill.js"></script>
  <script src="options.js"></script>
</body>
</html>
